name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker-nvidia:
    uses: VibeSmiths/.github/.github/workflows/docker-build.yml@main
    secrets: inherit
    with:
      image-name: mcp-rvc

  docker-rocm:
    uses: VibeSmiths/.github/.github/workflows/docker-build.yml@main
    secrets: inherit
    with:
      image-name: mcp-rvc-rocm
      dockerfile: Dockerfile.rocm
